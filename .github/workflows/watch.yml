name: Cineplex seat watch

on:
  schedule:
    - cron: "7 * * * *"     # hourly at :07 (hourly crons fire far more reliably
                            # than */5; each run sweeps every 5 min for the hour)
  workflow_dispatch: {}      # manual "Run workflow" button for testing

concurrency:
  group: seat-watch
  cancel-in-progress: true   # a new hourly run supersedes the old one

permissions:
  contents: write            # to commit state.json back

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pillow (seat-map images)
        run: pip install --quiet pillow

      - name: Watch (12 sweeps, 5 min apart)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM: ${{ secrets.TWILIO_FROM }}
          TWILIO_TO: ${{ secrets.TWILIO_TO }}
        run: |
          git config user.name "seat-watch-bot"
          git config user.email "actions@users.noreply.github.com"
          for i in $(seq 1 12); do
            echo "=== Sweep $i/12 at $(date -u +%H:%M) UTC ==="
            python watcher.py || echo "sweep $i failed - continuing"
            git add state.json
            if ! git diff --cached --quiet; then
              git commit -m "update seat state [skip ci]"
              # another run may have pushed since checkout - rebase, keeping
              # our (newer) state.json if both changed it
              git pull --rebase -X theirs origin main || true
              git push || true
            fi
            if [ "$i" -lt 12 ]; then sleep 240; fi
          done
