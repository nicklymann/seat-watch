name: Cineplex seat watch

on:
  schedule:
    - cron: "*/5 * * * *"    # every 5 min — GitHub's minimum (may still delay a few min)
  workflow_dispatch: {}       # allows manual "Run workflow" button for testing

concurrency:
  group: seat-watch
  cancel-in-progress: false

permissions:
  contents: write             # to commit state.json back

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pillow (seat-map images)
        run: pip install --quiet pillow

      - name: Check seats
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM: ${{ secrets.TWILIO_FROM }}
          TWILIO_TO: ${{ secrets.TWILIO_TO }}
        run: python watcher.py

      - name: Save state
        if: always()          # commit state even if the check step failed
        run: |
          git config user.name "seat-watch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "update seat state [skip ci]"
          git push
